<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formular de Contact</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Resetăm marginile și aplicăm un model de dimensionare corect */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .contact-box {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9em;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95em;
            transition: border-color 0.3s ease;
        }

        /* Setăm înălțimea pentru câmpul de mesaj și permitem redimensionarea doar pe verticală */
        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Efectul când dai click în interiorul unei căsuțe pentru a scrie */
        input:focus, textarea:focus {
            border-color: #4a90e2;
            outline: none;
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>

    <div class="contact-box">
        <h2>Scrie-ne un mesaj</h2>
        
        <form action="#" method="POST">
            <div class="input-group">
                <label for="nume">Numele tău</label>
                <input type="text" id="nume" placeholder="Ex: Ion Popescu" required>
            </div>
            
            <div class="input-group">
                <label for="email">Adresa de email</label>
                <input type="email" id="email" placeholder="email@exemplu.com" required>
            </div>
            
            <div class="input-group">
                <label for="mesaj">Mesajul tău</label>
                <textarea id="mesaj" placeholder="Cu ce te putem ajuta?" required></textarea>
            </div>
            
            <button type="submit">Trimite Mesajul</button>
        </form>
    </div>

</body>
</html>
