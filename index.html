<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagină Demo Elegantă</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Un gradient subtil pe fundal în loc de o singură culoare */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            margin: 0;
            padding: 0;
            
            /* Tehnica modernă pentru centrarea perfectă pe mijlocul ecranului */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 16px; /* Colțuri mai rotunjite */
            /* O umbră mai difuză și modernă */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            /* Tranziție pentru un efect fluid la hover */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Efect subtil de ridicare a cartelei la trecerea cu mouse-ul */
        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        h1 {
            color: #2c3e50; /* Un albastru-marin închis, mai elegant */
            margin-top: 0;
            font-weight: 600;
            font-size: 2em;
        }

        p {
            font-size: 1.05em;
            line-height: 1.7;
            color: #666; /* Gri mai deschis pentru text, face titlul să iasă în evidență */
            margin-bottom: 35px;
            font-weight: 300;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px; /* Transformă butonul într-o "pilulă" */
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3); /* Umbră colorată pentru buton */
            transition: all 0.3s ease; /* Animație fluidă pentru toate stările de hover */
        }

        .btn:hover {
            background: linear-gradient(135deg, #357abd 0%, #285a8e 100%);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.5);
            /* Butonul se ridică ușor spre utilizator */
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Salutare!</h1>
        <p>Acesta este un șablon web cu un design modernizat. Are un aspect mai curat, umbre fine și folosește tehnici actuale precum Flexbox pentru centrare.</p>
        <a href="#" class="btn">Află mai multe</a>
    </div>

</body>
</html>
